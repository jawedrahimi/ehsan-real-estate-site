backend:
    name: Backend Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
  
    defaults:
      run:
        working-directory: server
  
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
  
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
  
      - name: Show backend files
        run: |
          pwd
          ls -la
          test -f server.js
  
      - name: Install backend dependencies
        run: npm install
  
      - name: Syntax check backend
        run: node --check ./server.js